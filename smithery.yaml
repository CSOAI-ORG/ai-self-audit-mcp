name: ai-self-audit-mcp
description: MCP server for ai self audit. Features self audit, audit conversation,
  get certificate. From MEOK AI Labs.
version: 1.0.0
tools:
- name: self_audit
  description: 'AI agent self-audits EU AI Act compliance. Call: ''Am I compliant
    right now?'''
  parameters:
  - name: system_description
    type: string
    required: true
  - name: article
    type: string
    required: false
- name: audit_conversation
  description: Audit conversation for bias, PII, manipulation, transparency issues.
  parameters:
  - name: text
    type: string
    required: true
- name: get_certificate
  description: Generate timestamped compliance certificate for audit trail.
  parameters:
  - name: system_name
    type: string
    required: true
  - name: description
    type: string
    required: true
- name: regulatory_pulse
  description: Current regulatory deadlines and enforcement status.
  parameters: []
- name: get_audit_trail
  description: Return audit trail of all self-audit checks.
  parameters: []
